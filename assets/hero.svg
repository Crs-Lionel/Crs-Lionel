<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Crs Lionel profile banner</title>
  <desc id="desc">A cinematic automation control-room banner for Crs Lionel, Agentic AI and Automation Builder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060913"/>
      <stop offset="0.43" stop-color="#101827"/>
      <stop offset="0.7" stop-color="#062B2C"/>
      <stop offset="1" stop-color="#271426"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="120" x2="1020" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20D6B5"/>
      <stop offset="0.52" stop-color="#F5C2E7"/>
      <stop offset="1" stop-color="#F9E36E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(905 162) rotate(141) scale(410 250)">
      <stop stop-color="#20D6B5" stop-opacity="0.42"/>
      <stop offset="0.52" stop-color="#F5C2E7" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#060913" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .grid { stroke: rgba(205, 214, 244, 0.11); stroke-width: 1; }
      .thin { stroke: rgba(205, 214, 244, 0.22); stroke-width: 1.2; }
      .accent { stroke: url(#accent); stroke-width: 2.5; stroke-linecap: round; }
      .node { fill: #09111f; stroke: rgba(205, 214, 244, 0.45); stroke-width: 1.5; }
      .label { fill: #CDD6F4; font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .mono { fill: #20D6B5; font-family: Consolas, Menlo, monospace; letter-spacing: 0; }
      .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 3.2s ease-in-out infinite 1.1s; transform-origin: center; }
      .pulse3 { animation: pulse 3.2s ease-in-out infinite 2.1s; transform-origin: center; }
      .dash { stroke-dasharray: 9 12; animation: flow 8s linear infinite; }
      .rise { animation: rise 7s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .62; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes flow { to { stroke-dashoffset: -180; } }
      @keyframes rise { 0%,100% { transform: translateY(0); opacity: .55; } 50% { transform: translateY(-8px); opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#glow)"/>
  <g opacity="0.7">
    <path class="grid" d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200"/>
    <path class="grid" d="M90 0V420M180 0V420M270 0V420M360 0V420M450 0V420M540 0V420M630 0V420M720 0V420M810 0V420M900 0V420M990 0V420M1080 0V420"/>
  </g>

  <path class="accent dash" d="M116 292C238 196 319 320 430 236C547 147 632 277 751 190C842 124 931 135 1054 88"/>
  <path class="thin" d="M101 315C224 253 314 352 444 296C557 248 676 296 791 236C884 188 974 197 1093 148"/>

  <g class="rise">
    <circle cx="910" cy="113" r="72" fill="#20D6B5" opacity="0.1" filter="url(#soft)"/>
    <circle cx="1017" cy="261" r="92" fill="#F5C2E7" opacity="0.11" filter="url(#soft)"/>
  </g>

  <g transform="translate(94 82)">
    <text class="mono" x="0" y="0" font-size="16">SYSTEM.ONLINE / AGENTIC_WORKFLOWS</text>
    <text class="label" x="0" y="83" font-size="76" font-weight="800">Crs Lionel</text>
    <text class="label" x="4" y="132" font-size="28" font-weight="500" fill-opacity="0.9">Agentic AI &amp; Automation Builder</text>
    <rect x="4" y="164" width="478" height="2.5" rx="1.25" fill="url(#accent)"/>
    <text class="label" x="4" y="205" font-size="18" fill-opacity="0.72">Pipelines, applied ML, workflow orchestration, and product-minded systems.</text>
  </g>

  <g transform="translate(707 96)">
    <rect class="node pulse" x="0" y="52" width="122" height="52" rx="16"/>
    <text class="mono" x="22" y="84" font-size="16">INTENT</text>
    <rect class="node pulse2" x="170" y="0" width="148" height="56" rx="18"/>
    <text class="mono" x="194" y="35" font-size="16">AGENT</text>
    <rect class="node pulse3" x="364" y="62" width="154" height="58" rx="18"/>
    <text class="mono" x="389" y="98" font-size="16">OUTPUT</text>
    <rect class="node pulse2" x="167" y="160" width="166" height="58" rx="18"/>
    <text class="mono" x="194" y="197" font-size="16">AUTOMATE</text>
    <path class="accent dash" d="M122 78C156 75 160 41 170 28"/>
    <path class="accent dash" d="M318 31C360 34 364 70 364 91"/>
    <path class="accent dash" d="M122 91C159 123 170 161 185 177"/>
    <path class="accent dash" d="M333 188C393 181 434 144 448 120"/>
  </g>

  <g opacity="0.9">
    <circle cx="135" cy="300" r="5" fill="#20D6B5"/>
    <circle cx="432" cy="236" r="5" fill="#F5C2E7"/>
    <circle cx="754" cy="190" r="5" fill="#F9E36E"/>
    <circle cx="1054" cy="88" r="5" fill="#20D6B5"/>
  </g>
</svg>
