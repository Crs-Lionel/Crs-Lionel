<svg width="1200" height="310" viewBox="0 0 1200 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Automation pipeline visual</title>
  <desc id="desc">A workflow diagram showing intent moving through agents, tools, data, automation, and deployed output.</desc>
  <defs>
    <linearGradient id="line" x1="90" y1="158" x2="1110" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20D6B5"/>
      <stop offset="0.5" stop-color="#F5C2E7"/>
      <stop offset="1" stop-color="#F9E36E"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <style>
      .bg { fill: #060913; }
      .track { stroke: url(#line); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 14 16; animation: move 7s linear infinite; }
      .box { fill: url(#panel); stroke: rgba(205,214,244,.32); stroke-width: 1.4; }
      .title { fill: #CDD6F4; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 0; }
      .caption { fill: rgba(205,214,244,.72); font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 14px; letter-spacing: 0; }
      .chip { fill: #20D6B5; font-family: Consolas, Menlo, monospace; font-size: 13px; letter-spacing: 0; }
      .dot { animation: blink 2.6s ease-in-out infinite; }
      .dot2 { animation: blink 2.6s ease-in-out infinite .7s; }
      .dot3 { animation: blink 2.6s ease-in-out infinite 1.4s; }
      @keyframes move { to { stroke-dashoffset: -220; } }
      @keyframes blink { 0%,100% { opacity: .45; transform: scale(1); } 50% { opacity: 1; transform: scale(1.12); } }
    </style>
  </defs>
  <rect class="bg" width="1200" height="310" rx="26"/>
  <path class="track" d="M116 156H1084"/>

  <g transform="translate(74 72)">
    <rect class="box" width="174" height="168" rx="18"/>
    <text class="chip" x="24" y="36">01 / INPUT</text>
    <text class="title" x="24" y="77">Intent</text>
    <text class="caption" x="24" y="111">rough idea</text>
    <text class="caption" x="24" y="134">clear outcome</text>
  </g>
  <g transform="translate(286 72)">
    <rect class="box" width="174" height="168" rx="18"/>
    <text class="chip" x="24" y="36">02 / AI</text>
    <text class="title" x="24" y="77">Agent</text>
    <text class="caption" x="24" y="111">plan, call tools</text>
    <text class="caption" x="24" y="134">reason, refine</text>
  </g>
  <g transform="translate(498 72)">
    <rect class="box" width="174" height="168" rx="18"/>
    <text class="chip" x="24" y="36">03 / DATA</text>
    <text class="title" x="24" y="77">Model</text>
    <text class="caption" x="24" y="111">ML signals</text>
    <text class="caption" x="24" y="134">structured context</text>
  </g>
  <g transform="translate(710 72)">
    <rect class="box" width="174" height="168" rx="18"/>
    <text class="chip" x="24" y="36">04 / OPS</text>
    <text class="title" x="24" y="77">Automate</text>
    <text class="caption" x="24" y="111">n8n-style flows</text>
    <text class="caption" x="24" y="134">repeatable runs</text>
  </g>
  <g transform="translate(922 72)">
    <rect class="box" width="204" height="168" rx="18"/>
    <text class="chip" x="24" y="36">05 / SHIP</text>
    <text class="title" x="24" y="77">Working Product</text>
    <text class="caption" x="24" y="111">prototype, deploy</text>
    <text class="caption" x="24" y="134">learn, improve</text>
  </g>

  <g>
    <circle class="dot" cx="248" cy="156" r="7" fill="#20D6B5"/>
    <circle class="dot2" cx="460" cy="156" r="7" fill="#F5C2E7"/>
    <circle class="dot3" cx="672" cy="156" r="7" fill="#F9E36E"/>
    <circle class="dot2" cx="884" cy="156" r="7" fill="#20D6B5"/>
  </g>
</svg>
